libs:
  chimerax: "/usr/local/chimerax/bin/ChimeraX"

  # Conda/mamba-installed command-line tools can stay as executable names.
  obabel: "obabel"
  parallel: "parallel"
  vina: "vina"

  # MGLTools scripts need the explicit pythonsh + script path.
  prepare_receptor: "$MGLTOOLS/bin/pythonsh $MGLTOOLS/MGLToolsPckgs/AutoDockTools/Utilities24/prepare_receptor4.py"
  prepare_ligand: "$MGLTOOLS/bin/pythonsh $MGLTOOLS/MGLToolsPckgs/AutoDockTools/Utilities24/prepare_ligand4.py"
  
  # DOCK6 tools are usually installed outside conda and should be absolute paths.
  dock6: "$DOCK_HOME/bin/dock6"
  sphgen: "$DOCK_HOME/bin/sphgen"
  sphere_selector: "$DOCK_HOME/bin/sphere_selector"
  showbox: "$DOCK_HOME/bin/showbox"
  grid: "$DOCK_HOME/bin/grid"

common:
  # working_dir is scratch space; receptor and ligand inputs are read from here or absolute paths.
  working_dir: "/home/kbui/SARS_COV_2/scratch/test/"
  receptor: "/home/kbui/SARS_COV_2/data/6W63.pdb"
  # CSV header must be: smiles,name
  ligand: "/home/kbui/SARS_COV_2/data/ligands_list.csv"

  results_dir: "/home/kbui/SARS_COV_2/results/test/"
  pocket_name: "catalytic_site"
  # Vina parallel jobs = total_cpu // vina.cpu; DOCK6 parallel jobs = total_cpu.
  total_cpu: 16
  # Maximum number of poses to parse into the summary CSV.
  max_poses: 8

vina:
  exhaustiveness: 64
  num_modes: 8
  # CPU count per ligand docking job.
  cpu: 1
  padding: 5.0
  # "res" or "lig"
  pocket_option: "res"
  # used if pocket_option is "lig"
  reference: "/home/kbui/SARS_COV_2/data/ref_ligand.pdb"
  # used if pocket_option is "res", should be a valid PyMOL selection string
  residue_selection: "chain A and resi 41+145+140+143+144+145+163+166" 

dock6:
  max_orientations: 5000
  radius: 10.0
  padding: 5.0
  # should be a valid PyMOL selection string
  residue_selection: "chain A and resi 41+145+140+143+144+145+163+166"
